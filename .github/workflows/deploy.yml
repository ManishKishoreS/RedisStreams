name: Deploy RetireSmart to GitHub Pages

on:
  push:
    branches: [main, claude/serene-davinci-dCHzI]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: retirement-planner/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: retirement-planner

      - name: Build
        run: npm run build
        working-directory: retirement-planner
        env:
          VITE_BASE_URL: /redisstreams/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: retirement-planner/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
